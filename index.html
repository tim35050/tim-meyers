<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Tim Meyers — French-American technology generalist. Fifteen years building at the seams of data, design, code and impact."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Tim Meyers — Portfolio</title>
    <style>
      @keyframes tm-pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }
      .tm-loading-pulse {
        animation: tm-pulse 1.2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Minimal static placeholder shown before the React bundle finishes
        parsing. React replaces the entire #root contents on mount, so this
        is only visible during the cold-start window (~ a few hundred ms on
        desktop, longer on slower mobile networks).
      -->
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 14px;
          background: #0a0a0a;
          color: #ededed;
          font-family:
            'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
          font-size: 11px;
          letter-spacing: 0.16em;
          text-transform: uppercase;
        "
      >
        <span style="font-weight: 600">TIM/MEYERS</span>
        <span class="tm-loading-pulse" style="opacity: 0.35">loading…</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
